services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - stonks-data:/data
    environment:
      - STONKS_DB=/data/stonks.db

  sync:
    build: .
    command: ["sync", "--watch", "--interval", "10"]
    volumes:
      - stonks-data:/data
      - ${SSH_KEY_PATH:-~/.ssh}:/root/.ssh:ro
      - ${STONKS_CONFIG:-~/.stonks/remotes.toml}:/root/.stonks/remotes.toml:ro
    environment:
      - STONKS_DB=/data/stonks.db
    depends_on:
      - dashboard

volumes:
  stonks-data:
